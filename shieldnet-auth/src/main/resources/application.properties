spring.application.name=shieldnet-auth
server.port=8081

# PostgreSQL Config
spring.datasource.url=jdbc:postgresql://localhost:5432/shieldnet_auth_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Secret (Em produńŃo, isso ficaria num Vault ou Env Var)
api.security.token.secret=${JWT_SECRET:my-secret-key-shieldnet-2026}